# Drop-in for /etc/nginx/sites-available/swinglogger
# After editing, symlink into sites-enabled and reload nginx:
#   sudo ln -s /etc/nginx/sites-available/swinglogger /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# SSL: get a cert with `sudo certbot --nginx -d swinglogger.baselinetech.ie`
# (certbot will rewrite this file to add the listen 443 / ssl_certificate lines)

server {
    listen 80;
    listen [::]:80;
    server_name swinglogger.baselinetech.ie;

    # FIT files are small but allow some headroom
    client_max_body_size 12M;

    access_log /var/log/nginx/swinglogger.access.log;
    error_log  /var/log/nginx/swinglogger.error.log;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
