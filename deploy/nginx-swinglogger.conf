# Drop-in for /etc/nginx/sites-available/swinglogger
# After editing, symlink into sites-enabled and reload nginx:
#   sudo ln -s /etc/nginx/sites-available/swinglogger /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# SSL: get a cert with `sudo certbot --nginx -d swinglogger.baselinetech.ie`
# (certbot will rewrite this file to add the listen 443 / ssl_certificate lines)

server {
    listen 80;
    listen [::]:80;
    server_name swinglogger.baselinetech.ie;

    # FIT files are small but allow some headroom
    client_max_body_size 12M;

    # Hide nginx version in Server header
    server_tokens off;

    # Basic rate-limit: 5 uploads/min per IP, burst 3, queue rest as 429
    # (defined in /etc/nginx/conf.d/swinglogger-ratelimit.conf)
    location = /upload { limit_req zone=swinglogger_upload burst=3 nodelay;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/swinglogger.access.log;
    error_log  /var/log/nginx/swinglogger.error.log;

    # Security headers (HSTS only added by certbot block when on 443)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options         "DENY" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
