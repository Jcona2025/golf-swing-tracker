": "medium", "title": "H16 shot 3 \u2014 chip (2109mg)"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-6.246333383023739, 53.7630177475512]}, "properties": {"kind": "shot", "hole": 16, "shot_num_in_hole": 4, "shot_class": "putt", "marker_global": 45, "peak_mag": 1786.0, "marker-color": "#2a9d8f", "marker-symbol": "4", "marker-size": "medium", "title": "H16 shot 4 \u2014 putt (1786mg)"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-6.246356433257461, 53.76280962489545]}, "properties": {"kind": "shot", "hole": 17, "shot_num_in_hole": 1, "shot_class": "pitch", "marker_global": 46, "peak_mag": 7331.0, "marker-color": "#e63946", "marker-symbol": "1", "marker-size": "medium", "title": "H17 shot 1 \u2014 pitch (7331mg)"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-6.246851636096835, 53.76243319362402]}, "properties": {"kind": "shot", "hole": 17, "shot_num_in_hole": 2, "shot_class": "chip", "marker_global": 47, "peak_mag": 1923.0, "marker-color": "#f4a261", "marker-symbol": "2", "marker-size": "medium", "title": "H17 shot 2 \u2014 chip (1923mg)"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-6.246932856738567, 53.76233194023371]}, "properties": {"kind": "shot", "hole": 17, "shot_num_in_hole": 3, "shot_class": "putt", "marker_global": 48, "peak_mag": 1785.0, "marker-color": "#2a9d8f", "marker-symbol": "3", "marker-size": "medium", "title": "H17 shot 3 \u2014 putt (1785mg)"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-6.247102590277791, 53.76226991415024]}, "properties": {"kind": "shot", "hole": 18, "shot_num_in_hole": 1, "shot_class": "pitch", "marker_global": 49, "peak_mag": 8077.0, "marker-color": "#e63946", "marker-symbol": "1", "marker-size": "medium", "title": "H18 shot 1 \u2014 pitch (8077mg)"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-6.247715810313821, 53.76269806176424]}, "properties": {"kind": "shot", "hole": 18, "shot_num_in_hole": 2, "shot_class": "chip", "marker_global": 50, "peak_mag": 1802.0, "marker-color": "#f4a261", "marker-symbol": "2", "marker-size": "medium", "title": "H18 shot 2 \u2014 chip (1802mg)"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [-6.247832989320159, 53.76270979642868]}, "properties": {"kind": "shot", "hole": 18, "shot_num_in_hole": 3, "shot_class": "putt", "marker_global": 51, "peak_mag": 1992.0, "marker-color": "#2a9d8f", "marker-symbol": "3", "marker-size": "medium", "title": "H18 shot 3 \u2014 putt (1992mg)"}}]};
const SHOT_COLORS = { pitch: '#e63946', chip: '#f4a261', putt: '#2a9d8f' };

const map = L.map('map', { zoomControl: true, attributionControl: true });

// Esri World Imagery (free, high-res satellite)
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 22,
  attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
}).addTo(map);

const bounds = [];
const layers = L.featureGroup();

GEOJSON.features.forEach(f => {
  const g = f.geometry;
  const p = f.properties || {};

  if (g.type === 'Polygon' && p.kind === 'green') {
    const coords = g.coordinates[0].map(c => [c[1], c[0]]);
    bounds.push(...coords);
    L.polygon(coords, {
      color: '#2a9d8f', weight: 2, fillColor: '#7fc97f', fillOpacity: 0.35
    }).addTo(layers).bindPopup(`<div class="shot-popup"><b>Green H${p.hole}</b>${p.distance_m}m</div>`);
  } else if (g.type === 'LineString' && p.kind === 'gps_trail') {
    const coords = g.coordinates.map(c => [c[1], c[0]]);
    L.polyline(coords, { color: '#1d3557', weight: 2, opacity: 0.55 }).addTo(layers);
  } else if (g.type === 'Point' && p.kind === 'tee') {
    const icon = L.divIcon({
      className: 'leaflet-div-icon-tee', html: p.hole
    });
    L.marker([g.coordinates[1], g.coordinates[0]], { icon }).addTo(layers)
      .bindPopup(`<div class="shot-popup"><b>H${p.hole} tee</b>${p.distance_m}m</div>`);
  } else if (g.type === 'Point' && p.kind === 'shot') {
    const color = SHOT_COLORS[p.shot_class] || '#888';
    const icon = L.divIcon({
      className: 'leaflet-div-icon-shot',
      html: `<div style="background:${color};width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center">${p.shot_num_in_hole}</div>`
    });
    L.marker([g.coordinates[1], g.coordinates[0]], { icon }).addTo(layers)
      .bindPopup(`<div class="shot-popup"><b>H${p.hole} shot ${p.shot_num_in_hole}</b>${p.shot_class} &middot; ${p.peak_mag}mg</div>`);
  }
});

layers.addTo(map);
if (bounds.length > 0) { map.fitBounds(bounds, { padding: [40, 40] }); }
else { map.setView([53.76, -6.25], 17); }
