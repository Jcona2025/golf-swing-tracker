{% macro page_head(title) %}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title }} — SwingLogger</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f1faee; color: #1d3557; min-height: 100vh; }
  nav { background: #1d3557; color: white; padding: 10px 16px; display: flex; gap: 16px; align-items: center; }
  nav .brand { font-weight: 700; font-size: 15px; }
  nav a { color: white; text-decoration: none; font-size: 14px; opacity: 0.85; }
  nav a:hover, nav a.active { opacity: 1; text-decoration: underline; }
  .container { max-width: 900px; margin: 0 auto; padding: 18px; }
  h1 { font-size: 22px; margin: 0 0 16px; }
  h2 { font-size: 17px; margin: 22px 0 10px; color: #1d3557; }
  .card { background: white; border-radius: 10px; padding: 16px;
    box-shadow: 0 2px 12px rgba(29,53,87,0.06); margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eef0f3; }
  th { background: #f8fafc; color: #1d3557; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  tr:hover { background: #f8fafc; }
  td a { color: #2a9d8f; text-decoration: none; }
  td a:hover { text-decoration: underline; }
  .empty { text-align: center; color: #6c8aa3; padding: 28px; font-size: 14px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
  .stat { background: #f8fafc; padding: 10px 12px; border-radius: 6px; }
  .stat .label { font-size: 11px; color: #6c8aa3; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat .value { font-size: 22px; font-weight: 700; color: #1d3557; margin-top: 2px; }
  .stat .sub { font-size: 11px; color: #6c8aa3; margin-top: 2px; }
  .chart-wrap { position: relative; height: 240px; }
  @media (max-width: 600px) {
    nav { font-size: 13px; gap: 10px; }
    .container { padding: 12px; }
    th, td { padding: 6px 8px; }
  }
</style>
{% endmacro %}

{% macro nav_bar(active) %}
<nav>
  <span class="brand">SwingLogger</span>
  <a href="/" {% if active == 'upload' %}class="active"{% endif %}>Upload</a>
  <a href="/rounds" {% if active == 'rounds' %}class="active"{% endif %}>Rounds</a>
  <a href="/stats" {% if active == 'stats' %}class="active"{% endif %}>Stats</a>
</nav>
{% endmacro %}
