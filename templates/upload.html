<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SwingLogger — Pitch & Putt Tracker</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f1faee; color: #1d3557; min-height: 100vh; }
  .container { max-width: 460px; margin: 0 auto; padding: 24px 18px; }
  header h1 { margin: 0 0 4px; font-size: 22px; }
  header p { margin: 0 0 22px; color: #457b9d; font-size: 14px; }
  .card { background: white; border-radius: 10px; padding: 18px;
    box-shadow: 0 2px 12px rgba(29,53,87,0.08); }
  label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; color: #1d3557; }
  label:first-child { margin-top: 0; }
  select, input[type=file] { width: 100%; padding: 10px; font-size: 15px;
    border: 1px solid #d6dde4; border-radius: 6px; background: #fafbfc; }
  .drop {
    border: 2px dashed #a8dadc; border-radius: 8px; padding: 28px 14px;
    text-align: center; color: #457b9d; cursor: pointer; transition: 0.15s;
    background: #fafbfc;
  }
  .drop.dragover { background: #e0f3f5; border-color: #2a9d8f; color: #1d3557; }
  .drop strong { color: #1d3557; display: block; margin-bottom: 4px; }
  .drop .sub { font-size: 12px; }
  .file-name { margin-top: 8px; font-size: 13px; color: #2a9d8f; word-break: break-all; }
  button {
    width: 100%; padding: 12px; margin-top: 18px;
    background: #2a9d8f; color: white; border: 0; border-radius: 6px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  button:hover { background: #21867a; }
  button:disabled { background: #a8dadc; cursor: not-allowed; }
  footer { text-align: center; font-size: 11px; color: #6c8aa3; margin-top: 22px; }
  footer a { color: #6c8aa3; }
  #spinner { display: none; text-align: center; margin-top: 14px; color: #457b9d; font-size: 13px; }
  #spinner.active { display: block; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>SwingLogger</h1>
    <p>Drop your round, get the scorecard.</p>
  </header>

  <div class="card">
    <form id="form" method="post" action="/upload" enctype="multipart/form-data">
      <label for="course">Course</label>
      <select name="course" id="course" required>
        {% for c in courses %}
          <option value="{{ c.file }}">{{ c.name }} ({{ c.n_holes }} holes)</option>
        {% endfor %}
      </select>

      <label>Round file</label>
      <div class="drop" id="drop">
        <strong>Tap or drop your .fit file here</strong>
        <div class="sub">Export from Garmin Connect → Activity → Export Original</div>
        <div class="file-name" id="file-name"></div>
        <input type="file" name="fit" id="fit" accept=".fit" required style="display:none">
      </div>

      <button type="submit" id="submit">Analyze round</button>
      <div id="spinner">Processing… this takes a few seconds.</div>
    </form>
  </div>

  <footer>
    <a href="https://baselinetech.ie">Baseline Tech</a>
  </footer>
</div>

<script>
  const drop = document.getElementById('drop');
  const fitInput = document.getElementById('fit');
  const fileName = document.getElementById('file-name');
  const form = document.getElementById('form');
  const submit = document.getElementById('submit');
  const spinner = document.getElementById('spinner');

  drop.addEventListener('click', () => fitInput.click());
  ['dragenter','dragover'].forEach(ev =>
    drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(ev =>
    drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('dragover'); }));
  drop.addEventListener('drop', e => {
    if (e.dataTransfer.files.length) {
      fitInput.files = e.dataTransfer.files;
      fileName.textContent = fitInput.files[0].name;
    }
  });
  fitInput.addEventListener('change', () => {
    if (fitInput.files.length) fileName.textContent = fitInput.files[0].name;
  });

  form.addEventListener('submit', () => {
    submit.disabled = true;
    submit.textContent = 'Processing…';
    spinner.classList.add('active');
  });
</script>
</body>
</html>
